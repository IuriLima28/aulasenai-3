<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Desconto em produto</title>
    <style>
            body {
              background: #e3eeff;
              font-family: "Times New Roman", Times, serif;
            }
          
            button {
              border-radius: 10px;
              border-color: #e3eeff;
              background-color: white;
            }
          
            input {
              border-radius: 10px;
            }
          </style>
</head>
<body>
    <h1>Desconto em produto</h1>
    <input type="number" placeholder="Qual o preço do produto" id="input">
    <br>
    <button onclick="Calcular()">Calcular</button>

    <script>
        function Calcular() {
        var ValorProd = document.getElementById("input").value
        var desconto = ValorProd * 0.10
        var ValorFinal = ValorProd - desconto
            alert("O valor a ser pago é: " +ValorFinal)
        }
    </script>
</body>
</html>
